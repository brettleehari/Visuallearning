services:
  - type: web
    name: visual-learning-api
    runtime: python
    region: oregon
    plan: free
    rootDir: vector-search-visualizer/backend
    buildCommand: pip install -r requirements-lite.txt
    startCommand: uvicorn main_lite:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
